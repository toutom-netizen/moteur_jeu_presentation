# Fichier : config/player_stats.toml
# Configuration des caractéristiques du personnage par niveau
# max_level : niveau maximum du personnage (doit correspondre aux dossiers sprite/personnage/1..N)
max_level = 5
# double_jump_unlock_level : niveau minimal pour autoriser le double saut (1..max_level ; défaut 3 si absent)
double_jump_unlock_level = 3
# display_name : nom affiché au-dessus du sprite et dans le titre des statistiques (obligatoire, non vide)
display_name = "nom"

# [presentation] : textes de la colonne droite de l'écran statistiques (S) — trois listes obligatoires, non vides, sans entrée vide
[presentation]
origins = [
    "origin 1 : origine",
    "origin 2 : origine",
    "origin 3 : origine",
]
class_role = [
    "Classe 1 : classe",
    "Classe 2 : classe",
    "Classe 3 : classe",
]
traits = [
    "trait 1",
    "trait 2",
    "trait 3",
]

